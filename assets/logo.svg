<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">

  <!-- Shield outline -->
  <path d="M36 10 L64 10 L70 16 L70 52 C70 70 52 82 50 82 C48 82 30 70 30 52 L30 16 Z"
        stroke="#A0A0A0" stroke-width="2.5" stroke-linejoin="round" fill="none"/>

  <!-- Fence pickets (3 posts with pointed tops) inside the shield -->
  <!-- Left picket -->
  <line x1="40" y1="62" x2="40" y2="38" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="40,30 36.5,39 43.5,39" fill="#FF6B35"/>

  <!-- Middle picket -->
  <line x1="50" y1="62" x2="50" y2="35" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="50,27 46.5,36 53.5,36" fill="#FF6B35"/>

  <!-- Right picket -->
  <line x1="60" y1="62" x2="60" y2="38" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="60,30 56.5,39 63.5,39" fill="#FF6B35"/>

  <!-- Horizontal rail -->
  <line x1="36" y1="52" x2="64" y2="52" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>

  <!-- Wordmark: "ai" light + "fence" orange -->
  <text x="88" y="69" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="38" font-weight="500">
    <tspan fill="#A0A0A0">ai</tspan><tspan fill="#FF6B35">fence</tspan>
  </text>

</svg>
