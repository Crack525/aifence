<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">

  <!-- Shield outline — heater-shield shape, visual center at y=55 to match text caps -->
  <path d="M36 21 L64 21 L70 27 L70 63 C70 79 52 89 50 89 C48 89 30 79 30 63 L30 27 Z"
        stroke="#A0A0A0" stroke-width="2.5" stroke-linejoin="round" fill="none"/>

  <!-- Fence pickets — 3 posts with pointed tops, inside the shield -->
  <!-- Left picket -->
  <line x1="40" y1="71" x2="40" y2="49" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="40,41 36.5,50 43.5,50" fill="#FF6B35"/>

  <!-- Middle picket (tallest) -->
  <line x1="50" y1="71" x2="50" y2="46" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="50,38 46.5,47 53.5,47" fill="#FF6B35"/>

  <!-- Right picket -->
  <line x1="60" y1="71" x2="60" y2="49" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="60,41 56.5,50 63.5,50" fill="#FF6B35"/>

  <!-- Horizontal rail -->
  <line x1="36" y1="61" x2="64" y2="61" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>

  <!-- Wordmark — baseline y=69, cap center ≈ y=55.5, matches shield center y=55 -->
  <text x="88" y="69" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="38" font-weight="500">
    <tspan fill="#A0A0A0">ai</tspan><tspan fill="#FF6B35">fence</tspan>
  </text>

</svg>
