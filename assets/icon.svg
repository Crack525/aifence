<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Shield outline -->
  <path d="M50 8 L88 22 L88 56 C88 76 66 90 50 94 C34 90 12 76 12 56 L12 22 Z"
        stroke="#A0A0A0" stroke-width="3" stroke-linejoin="round" fill="none"/>

  <!-- Fence pickets (3 posts with pointed tops) inside the shield -->
  <!-- Left picket -->
  <line x1="33" y1="72" x2="33" y2="44" stroke="#FF6B35" stroke-width="4.5" stroke-linecap="round"/>
  <polygon points="33,34 28.5,45 37.5,45" fill="#FF6B35"/>

  <!-- Middle picket -->
  <line x1="50" y1="72" x2="50" y2="40" stroke="#FF6B35" stroke-width="4.5" stroke-linecap="round"/>
  <polygon points="50,30 45.5,41 54.5,41" fill="#FF6B35"/>

  <!-- Right picket -->
  <line x1="67" y1="72" x2="67" y2="44" stroke="#FF6B35" stroke-width="4.5" stroke-linecap="round"/>
  <polygon points="67,34 62.5,45 71.5,45" fill="#FF6B35"/>

  <!-- Horizontal rail -->
  <line x1="27" y1="60" x2="73" y2="60" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>

</svg>
